name: Release

# Déclenché en poussant un tag `vX.Y.Z` (doit correspondre à "version" dans
# src-tauri/tauri.conf.json). Build + signe (Authenticode auto-signé + clé updater) +
# publie les installeurs .msi/.exe et le manifest latest.json en brouillon de release
# GitHub. Vérifier la release puis la publier manuellement déclenche la distribution aux
# clients (l'updater ne lit que les releases publiées, pas les brouillons).
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      # Le thumbprint dans src-tauri/tauri.conf.json (bundle.windows.certificateThumbprint)
      # est déterministe pour ce certificat précis : importer le même PFX ici reproduit
      # exactement le thumbprint généré en local, pas besoin de le reconfigurer par CI.
      - name: Import code signing certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $securePw = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePw
          Remove-Item $certPath

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Valorant Tracker ${{ github.ref_name }}"
          releaseBody: "Voir les commits de cette version pour le détail des changements."
          releaseDraft: true
          prerelease: false
