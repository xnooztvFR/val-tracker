name: Build

# Vérifie que le projet compile et que les tests passent sur chaque push/PR — ne remplace
# pas le flux de release existant (scripts/release.ps1, voir README) : ce workflow ne signe
# rien et ne publie aucun artefact, il sert uniquement de garde-fou continu.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check + build frontend
        run: npm run build

      - name: Frontend tests
        run: npm test

      - name: Rust check
        working-directory: src-tauri
        run: cargo check --locked

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Rust release build (compile only, no installer bundling)
        working-directory: src-tauri
        run: cargo build --release --locked
