name: Dependency audit

# Scanne les CVE connues des dépendances (Rust + npm) — build.yml compile et teste mais ne
# fait jamais ce scan. Non bloquant pour les PR (schedule + déclenchement manuel uniquement) :
# ne remplace pas Dependabot (.github/dependabot.yml), qui ouvre des PR de mise à jour ; ce
# job sert de filet hebdomadaire indépendant des PR ouvertes.
on:
  schedule:
    - cron: "0 6 * * 1" # tous les lundis 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        working-directory: src-tauri
        run: cargo audit

  npm-audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
